<script>
document.addEventListener("DOMContentLoaded", async () => {
  const postSegment = "/posts/";
  const pathname = window.location.pathname;
  const postIndex = pathname.indexOf(postSegment);

  if (postIndex === -1) {
    return;
  }

  const sitePrefix = pathname.slice(0, postIndex);
  const currentPost = pathname.slice(postIndex);
  const main = document.querySelector("main#quarto-document-content");

  if (!main) {
    return;
  }

  const fetchJson = async (url) => {
    const response = await fetch(url);
    if (!response.ok) {
      throw new Error("Could not load " + url);
    }
    return response.json();
  };

  try {
    const [listings, searchIndex] = await Promise.all([
      fetchJson(sitePrefix + "/listings.json"),
      fetchJson(sitePrefix + "/search.json")
    ]);

    const homeListing = listings.find((entry) => entry.listing === "/index.html");
    if (!homeListing || !Array.isArray(homeListing.items)) {
      return;
    }

    const currentIndex = homeListing.items.findIndex((item) => currentPost.endsWith(item));
    if (currentIndex === -1) {
      return;
    }

    const titles = new Map(
      searchIndex
        .filter((entry) => typeof entry.href === "string" && entry.href.startsWith("posts/"))
        .map((entry) => ["/" + entry.href, entry.title])
    );

    const createLink = (itemPath, label, arrow, className) => {
      if (!itemPath) {
        return null;
      }

      const anchor = document.createElement("a");
      anchor.className = "post-nav-link " + className;
      anchor.href = sitePrefix + itemPath;

      const meta = document.createElement("span");
      meta.className = "post-nav-meta";
      meta.textContent = arrow + " " + label;

      const title = document.createElement("span");
      title.className = "post-nav-title";
      title.textContent = titles.get(itemPath) || itemPath.split("/").pop().replace(/\.html$/, "");

      anchor.append(meta, title);
      return anchor;
    };

    const newer = currentIndex > 0 ? homeListing.items[currentIndex - 1] : null;
    const older = currentIndex < homeListing.items.length - 1 ? homeListing.items[currentIndex + 1] : null;

    if (!newer && !older) {
      return;
    }

    const nav = document.createElement("nav");
    nav.className = "post-nav";
    nav.setAttribute("aria-label", "Post navigation");

    const newerLink = createLink(newer, "Newer", "\u2190", "post-nav-newer");
    const olderLink = createLink(older, "Older", "\u2192", "post-nav-older");

    if (newerLink) {
      nav.appendChild(newerLink);
    }
    if (olderLink) {
      nav.appendChild(olderLink);
    }

    main.appendChild(nav);
  } catch (error) {
    console.warn(error);
  }
});
</script>
